<html lang="zh-HK">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>香港綠色信貸產品信息庫</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f4;
      --surface: #ffffff;
      --surface-soft: #eef3f0;
      --text: #1f2925;
      --muted: #5e6f67;
      --line: #d9e2dd;
      --green: #0b573f;
      --blue: #275f88;
      --amber: #8a5a12;
      --red: #9d3030;
      --shadow: 0 8px 24px rgba(23, 39, 31, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Microsoft JhengHei", "PingFang TC", "Noto Sans TC", Arial, sans-serif;
      line-height: 1.45;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--line);
      box-shadow: var(--shadow);
    }

    .header-inner {
      width: min(1600px, calc(100% - 32px));
      margin: 0 auto;
      padding: 18px 0 16px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
    }

    h1 {
      margin: 0;
      color: var(--green);
      font-size: 24px;
      line-height: 1.25;
      font-weight: 700;
    }

    .meta {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .actions {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .action,
    button {
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--surface);
      color: var(--text);
      font: inherit;
      font-size: 14px;
      text-decoration: none;
      cursor: pointer;
    }

    .action {
      display: inline-flex;
      align-items: center;
      padding: 7px 12px;
      white-space: nowrap;
    }

    button {
      padding: 7px 12px;
    }

    .primary {
      background: var(--green);
      border-color: var(--green);
      color: #fff;
    }

    .toolbar {
      width: min(1600px, calc(100% - 32px));
      margin: 16px auto 12px;
      display: grid;
      grid-template-columns: minmax(240px, 1.4fr) minmax(180px, 0.6fr) minmax(220px, 0.8fr) auto auto;
      gap: 10px;
      align-items: end;
    }

    label {
      display: grid;
      gap: 5px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
    }

    input,
    select {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--surface);
      color: var(--text);
      font: inherit;
      font-size: 14px;
      padding: 8px 10px;
    }

    .toggle {
      min-height: 38px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--surface);
      color: var(--text);
      font-size: 14px;
      white-space: nowrap;
    }

    .toggle input {
      width: 16px;
      min-height: 16px;
      margin: 0;
      accent-color: var(--green);
    }

    .stats {
      width: min(1600px, calc(100% - 32px));
      margin: 0 auto 12px;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .stat {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px 14px;
      min-height: 72px;
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
    }

    .stat strong {
      display: block;
      margin-top: 4px;
      color: var(--text);
      font-size: 26px;
      line-height: 1.1;
    }

    .table-shell {
      width: min(1600px, calc(100% - 32px));
      height: calc(100vh - 265px);
      min-height: 460px;
      margin: 0 auto 18px;
      overflow: auto;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    table {
      width: max-content;
      min-width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      font-size: 13px;
    }

    thead th {
      position: sticky;
      top: 0;
      z-index: 4;
      background: #eef3f0;
      border-bottom: 1px solid var(--line);
      color: #26332d;
      text-align: left;
      white-space: nowrap;
    }

    th,
    td {
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      padding: 9px 10px;
      vertical-align: top;
    }

    tbody tr:hover td {
      background: #fbfcfa;
    }

    th:first-child,
    td:first-child {
      position: sticky;
      left: 0;
      z-index: 3;
      background: var(--surface);
      min-width: 190px;
      max-width: 240px;
    }

    thead th:first-child {
      z-index: 5;
      background: #e3ece7;
    }

    th:nth-child(2),
    td:nth-child(2) {
      position: sticky;
      left: 190px;
      z-index: 3;
      background: var(--surface);
      min-width: 150px;
      max-width: 190px;
    }

    thead th:nth-child(2) {
      z-index: 5;
      background: #e3ece7;
    }

    .sort-button {
      min-height: auto;
      padding: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      color: inherit;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .sort-mark {
      width: 12px;
      color: var(--muted);
      font-size: 11px;
      display: inline-block;
    }

    .cell {
      max-width: 260px;
      overflow-wrap: anywhere;
    }

    .cell.long {
      max-width: 440px;
      min-width: 300px;
    }

    .cell.url {
      min-width: 150px;
      max-width: 190px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 3px 8px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--surface-soft);
      color: var(--text);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .chip.yes {
      border-color: rgba(11, 87, 63, 0.28);
      background: #e7f3ed;
      color: var(--green);
    }

    .chip.no {
      border-color: rgba(157, 48, 48, 0.25);
      background: #f9ecec;
      color: var(--red);
    }

    .chip.type {
      border-color: rgba(39, 95, 136, 0.25);
      background: #edf4fa;
      color: var(--blue);
      margin-right: 6px;
      margin-bottom: 4px;
    }

    .code {
      display: inline-block;
      color: var(--muted);
      font-family: Consolas, "Liberation Mono", monospace;
      font-size: 12px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    a.source-link {
      color: var(--blue);
      font-weight: 700;
      text-decoration: none;
    }

    a.source-link:hover {
      text-decoration: underline;
    }

    .empty {
      padding: 48px 16px;
      text-align: center;
      color: var(--muted);
      font-size: 15px;
    }

    @media (max-width: 980px) {
      .header-inner,
      .toolbar,
      .stats,
      .table-shell {
        width: min(100% - 20px, 1600px);
      }

      .header-inner {
        grid-template-columns: 1fr;
      }

      .actions {
        justify-content: flex-start;
      }

      .toolbar {
        grid-template-columns: 1fr 1fr;
      }

      .stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 620px) {
      h1 {
        font-size: 20px;
      }

      .toolbar,
      .stats {
        grid-template-columns: 1fr;
      }

      .table-shell {
        height: 62vh;
      }
    }
  </style>
</head>

    </section>
  </main>

    const searchInput = document.getElementById("searchInput");
    const bankFilter = document.getElementById("bankFilter");
    const typeFilter = document.getElementById("typeFilter");
    const smeOnly = document.getElementById("smeOnly");
    const reviewOnly = document.getElementById("reviewOnly");
    const tableHead = document.getElementById("tableHead");
    const tableBody = document.getElementById("tableBody");

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function uniqueSorted(values) {
      return Array.from(new Set(values.filter(Boolean))).sort((a, b) => a.localeCompare(b, "zh-Hant"));
    }

    function setOptions(select, values, allLabel) {
      select.innerHTML = '<option value="">' + allLabel + "</option>" + values.map((value) => {
        return '<option value="' + escapeHtml(value) + '">' + escapeHtml(TYPE_LABELS[value] || value) + "</option>";
      }).join("");
    }

    function buildHeader() {
      tableHead.innerHTML = COLUMNS.map((column) => {
        const label = LABELS[column] || column;
        return '<th data-column="' + escapeHtml(column) + '"><button class="sort-button" type="button">' + escapeHtml(label) + '<span class="sort-mark" aria-hidden="true"></span></button></th>';
      }).join("");

      tableHead.querySelectorAll("th").forEach((th) => {
        th.addEventListener("click", () => {
          const column = th.dataset.column;
          if (state.sortColumn === column) {
            state.sortDir = state.sortDir === "asc" ? "desc" : "asc";
          } else {
            state.sortColumn = column;
            state.sortDir = "asc";
          }
          render();
        });
      });
    }

    function buildFilters() {
      setOptions(bankFilter, uniqueSorted(DATA.map((row) => row.bank_name_cn)), "全部銀行");
      setOptions(typeFilter, uniqueSorted(DATA.map((row) => row.product_type)), "全部產品類型");
    }

    function matchRow(row) {
      const term = searchInput.value.trim().toLowerCase();
      if (bankFilter.value && row.bank_name_cn !== bankFilter.value) return false;
      if (typeFilter.value && row.product_type !== typeFilter.value) return false;
      if (smeOnly.checked && row.supports_sme !== "TRUE") return false;
      if (reviewOnly.checked && row.requires_external_review !== "TRUE") return false;
      if (!term) return true;
      return COLUMNS.some((column) => String(row[column] ?? "").toLowerCase().includes(term));
    }

    function compareRows(a, b) {
      const column = state.sortColumn;
      const direction = state.sortDir === "asc" ? 1 : -1;
      const av = a[column] ?? "";
      const bv = b[column] ?? "";

      if (NUMERIC_COLUMNS.has(column)) {
        const an = av === "" ? Number.NEGATIVE_INFINITY : Number(av);
        const bn = bv === "" ? Number.NEGATIVE_INFINITY : Number(bv);
        return (an - bn) * direction;
      }

      return String(av).localeCompare(String(bv), "zh-Hant", { numeric: true }) * direction;
    }

    function formatNumber(value) {
      if (value === "") return "";
      const num = Number(value);
      if (!Number.isFinite(num)) return escapeHtml(value);
      return new Intl.NumberFormat("zh-HK").format(num);
    }

    function formatCell(column, value) {
      if (column === "source_url") {
        if (!value) return '<span class="code">未披露</span>';
        return '<a class="source-link" href="' + escapeHtml(value) + '" target="_blank" rel="noopener">打開來源</a>';
      }

      if (BOOLEAN_COLUMNS.has(column)) {
        const yes = value === "TRUE";
        return '<span class="chip ' + (yes ? "yes" : "no") + '">' + (yes ? "是" : "否") + "</span>";
      }

      if (column === "product_type") {
        return '<span class="chip type">' + escapeHtml(TYPE_LABELS[value] || value || "未分類") + '</span><span class="code">' + escapeHtml(value) + "</span>";
      }

      if (NUMERIC_COLUMNS.has(column)) {
        return value === "" ? '<span class="code">未披露</span>' : formatNumber(value);
      }

      if (column === "eligible_project_tags" || column === "preferred_esg_ratings" || column === "suitable_company_scale") {
        return String(value || "")
          .split(";")
          .map((item) => item.trim())
          .filter(Boolean)
          .map((item) => '<span class="chip">' + escapeHtml(item) + "</span>")
          .join(" ");
      }

      return escapeHtml(value || "");
    }

    function cellClass(column) {
      if (LONG_COLUMNS.has(column)) return "cell long";
      if (column === "source_url") return "cell url";
      return "cell";
    }

    function updateStats(rows) {
      document.getElementById("statProducts").textContent = rows.length;
      document.getElementById("statBanks").textContent = new Set(rows.map((row) => row.bank_name_cn).filter(Boolean)).size;
      document.getElementById("statSme").textContent = rows.filter((row) => row.supports_sme === "TRUE").length;
      document.getElementById("statReview").textContent = rows.filter((row) => row.requires_external_review === "TRUE").length;
    }

    function updateSortMarks() {
      tableHead.querySelectorAll("th").forEach((th) => {
        const mark = th.querySelector(".sort-mark");
        mark.textContent = th.dataset.column === state.sortColumn ? (state.sortDir === "asc" ? "上" : "下") : "";
      });
    }

    function render() {
      const rows = DATA.filter(matchRow).sort(compareRows);
      updateStats(rows);
      updateSortMarks();

      if (rows.length === 0) {
        tableBody.innerHTML = '<tr><td class="empty" colspan="' + COLUMNS.length + '">沒有符合條件的產品。</td></tr>';
        return;
      }

      tableBody.innerHTML = rows.map((row) => {
        return "<tr>" + COLUMNS.map((column) => {
          return '<td><div class="' + cellClass(column) + '">' + formatCell(column, row[column]) + "</div></td>";
        }).join("") + "</tr>";
      }).join("");
    }

    ["input", "change"].forEach((eventName) => {
      searchInput.addEventListener(eventName, render);
      bankFilter.addEventListener(eventName, render);
      typeFilter.addEventListener(eventName, render);
      smeOnly.addEventListener(eventName, render);
      reviewOnly.addEventListener(eventName, render);
    });

    document.getElementById("resetButton").addEventListener("click", () => {
      searchInput.value = "";
      bankFilter.value = "";
      typeFilter.value = "";
      smeOnly.checked = false;
      reviewOnly.checked = false;
      state.sortColumn = "bank_name_cn";
      state.sortDir = "asc";
      render();
    });

    buildFilters();
    buildHeader();
    render();
  </script>
</body>
</html>
